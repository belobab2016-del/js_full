<!DOCTYPE html>
<html>
<head>
    <style>
        .box { width: 100px; height: 50px; background: silver; border: 1px solid black; }
        .row { margin-bottom: 20px; overflow: hidden; } /* Очищення потоку */
    </style>
</head>
<body>

    <!-- 1. Один ліворуч, другий праворуч -->
    <div class="row">
        <div class="box" style="float: left;">Ліво</div>
        <div class="box" style="float: right;">Право</div>
    </div>

    <!-- 2. Один ліворуч, кілька праворуч -->
    <div class="row">
        <div class="box" style="float: left;">Л1</div>
        <div class="box" style="float: right;">П2</div>
        <div class="box" style="float: right;">П1</div>
    </div>

    <!-- 3. Два ліворуч, два праворуч -->
    <div class="row">
        <div class="box" style="float: left;">Л1</div>
        <div class="box" style="float: left;">Л2</div>
        <div class="box" style="float: right;">П2</div>
        <div class="box" style="float: right;">П1</div>
    </div>

    <!-- 4. Три праворуч (два один під одним) -->
    <div class="row">
        <div class="box" style="float: right; height: 100px;">П1 (високий)</div>
        <div class="box" style="float: right;">П2</div>
        <div class="box" style="float: right; clear: right;">П3 (під П2)</div>
    </div>

    <!-- 5. Три по центру (два один під одним) -->
    <div class="row">
        <!-- Щоб центрувати флоати, задаємо ширину обгортки та margin: auto -->
        <div style="width: 210px; margin: 0 auto; overflow: hidden;">
            <div class="box" style="float: left; height: 100px; margin-right: 5px;">Ц1</div>
            <div class="box" style="float: left;">Ц2</div>
            <div class="box" style="float: left; clear: left; margin-top: 2px;">Ц3</div>
        </div>
    </div>

</body>
</html>
